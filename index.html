<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonsuz Kartvizit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
        }
        input { 
            width: 90%; 
            max-width: 300px; 
            padding: 10px; 
            margin: 5px; 
            border-radius: 5px; 
            border: none; 
        }
        button { 
            width: 90%; 
            max-width: 320px; 
            padding: 12px; 
            margin: 10px; 
            border-radius: 5px; 
            border: none; 
            cursor: pointer; 
            background: #007bff; 
            color: white; 
            font-weight: bold; 
        }
        #qrcode { 
            margin-top: 20px; 
            background: white; 
            padding: 10px; 
        }
        #downloadBtn { 
            background: #28a745; 
            display: none; 
        }
    </style>
</head>
<body>

    <h2>Sonsuz Kartvizit</h2>
    <input type="text" id="name" placeholder="Ad">
    <input type="text" id="surname" placeholder="Soyad">
    <input type="text" id="phone" placeholder="Telefon">
    <input type="text" id="email" placeholder="E-posta">
    <input type="text" id="title" placeholder="Unvan">
    
    <button onclick="generateQR()">Kartviziti Üret</button>
    
    <div id="qrcode"></div>
    <button id="downloadBtn" onclick="downloadQR()">QR Kodu İndir</button>

    <script>
        function generateQR() {
            const name = document.getElementById('name').value;
            const surname = document.getElementById('surname').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const title = document.getElementById('title').value;

            const vcard = `BEGIN:VCARD\nVERSION:3.0\nN:${surname};${name};;;\nFN:${name} ${surname}\nTEL;TYPE=CELL:${phone}\nEMAIL:${email}\nTITLE:${title}\nEND:VCARD`;

            const qrcodeDiv = document.getElementById("qrcode");
            qrcodeDiv.innerHTML = ""; 
            
            // QR Kod oluşturucu (Kütüphane varsayılan olarak canvas oluşturur)
            new QRCode(qrcodeDiv, {
                text: vcard,
                width: 256,
                height: 256
            });

            // Butonu görünür yap
            document.getElementById("downloadBtn").style.display = "block";
        }

        function downloadQR() {
            const qrcodeDiv = document.getElementById("qrcode");
            const canvas = qrcodeDiv.querySelector("canvas");

            if (canvas) {
                // Canvas verisini PNG olarak al
                const dataUrl = canvas.toDataURL("image/png");
                
                // İndirme işlemini başlat
                const link = document.createElement("a");
                link.href = dataUrl;
                link.download = "kartvizit_qr.png";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } else {
                alert("QR kod henüz oluşturulmamış.");
            }
        }
    </script>
</body>
</html>
